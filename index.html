<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibnbatota - Travel Leaderboard</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header / Navigation -->
  <header>
    <div class="header-container">
      <div class="logo">
        <span class="logo-emoji">✈️</span>
        <h1>IBNBATOTA</h1>
      </div>
      <p class="tagline">Who is the ultimate explorer? 🌍</p>
    </div>
  </header>

  <main class="main-container">
    <!-- Row 1: Leaderboard & Map -->
    <div class="grid-row row-top">
      
      <!-- Leaderboard Card -->
      <section class="card leaderboard-card">
        <div class="card-header">
          <h2>🏆 Explorer Leaderboard</h2>
        </div>
        <div class="card-body">
          <form id="add-friend-form-inline" class="add-friend-form-inline">
            <input type="text" id="friend-name-inline" placeholder="👤 Enter your name..." required>
            <select id="friend-emoji-inline" class="emoji-select" title="Choose avatar">
              <option value="🧑‍🚀">🧑‍🚀</option>
              <option value="🤠">🤠</option>
              <option value="🏕️">🏕️</option>
              <option value="🎒">🎒</option>
              <option value="✈️">✈️</option>
              <option value="🏄">🏄</option>
              <option value="🍕">🍕</option>
              <option value="🦁">🦁</option>
              <option value="🐼">🐼</option>
            </select>
            <button type="submit" class="btn btn-primary btn-sm">Join</button>
          </form>
          <div id="leaderboard-list" class="leaderboard-list">
            <!-- Dynamic Leaderboard Items go here -->
            <div class="loading-spinner">Loading explorer ranks...</div>
          </div>
        </div>
      </section>

      <!-- Map Card -->
      <section class="card map-card">
        <div class="card-header">
          <h2>🗺️ Global Footprint</h2>
          <div class="map-stats">
            <span id="map-country-count">0/180 Countries Visited</span>
          </div>
        </div>
        <div class="card-body map-container">
          <div id="map-wrapper" class="map-wrapper">
            <div class="loading-spinner">Loading interactive map...</div>
          </div>
          <div id="map-tooltip" class="map-tooltip hidden"></div>
        </div>
      </section>

    </div>

    <!-- Row 2: Friends Details & Log Visits -->
    <div class="grid-row row-bottom">
      
      <!-- Travel Log / Checkboxes -->
      <section class="card log-card">
        <div class="card-header">
          <h2>✏️ Log Visited Places</h2>
          <div class="active-friend-selector">
            <label for="select-friend">Editing: </label>
            <select id="select-friend">
              <!-- Dynamically populated friends -->
            </select>
          </div>
        </div>
        <div class="card-body">
          <!-- Quick Add Section -->
          <div class="quick-add-container">
            <input type="text" id="quick-add-country" placeholder="✍️ Type country name to add (e.g. France)..." list="countries-datalist">
            <datalist id="countries-datalist">
              <!-- Dynamically populated options for autocompletion -->
            </datalist>
            <button id="btn-quick-add" class="btn btn-primary btn-sm">Add Visit</button>
          </div>

          <div class="search-filter-bar">
            <input type="text" id="search-countries" placeholder="🔍 Filter list by name...">
          </div>
          
          <!-- Continent Tabs -->
          <div class="tabs">
            <button class="tab-btn active" data-tab="all">All</button>
            <button class="tab-btn" data-tab="Africa">Africa</button>
            <button class="tab-btn" data-tab="Americas">Americas</button>
            <button class="tab-btn" data-tab="Asia">Asia</button>
            <button class="tab-btn" data-tab="Europe">Europe</button>
            <button class="tab-btn" data-tab="Oceania">Oceania</button>
          </div>

          <div id="country-list-grid" class="country-list-grid">
            <!-- Dynamic checkboxes go here -->
          </div>
        </div>
      </section>

      <!-- Stats and Achievements Card -->
      <section class="card stats-card">
        <div class="card-header">
          <h2>🎖️ Explorer Profile & Badges</h2>
        </div>
        <div class="card-body">
          <div id="active-profile-header" class="profile-header">
            <!-- Will show active explorer's name and summary stats -->
          </div>
          
          <div class="profile-section-title">Continent Progress</div>
          <div id="continent-progress-bars" class="continent-progress-bars">
            <!-- Dynamically populated progress bars -->
          </div>

          <div class="profile-section-title">Unlocked Badges</div>
          <div id="badges-grid" class="badges-grid">
            <!-- Dynamically populated badges -->
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Scripts -->
  <script src="countries.js"></script>
  <script src="app.js"></script>
</body>
</html>
